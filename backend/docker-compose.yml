services:
  postgres:
    image: postgres:16
    platform: linux/amd64
    container_name: tide-raider-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tide-raider-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tide-raider-backend
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=development
      - PORT=4001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres?schema=public
      - REDIS_URL=redis://redis:6379
      - REDIS_ENABLED=true
      - DOCKER=true
      - GOOGLE_CLIENT_ID=82632174665-tlmshrjeeahbb3giec045o009u8ag67j.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=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
      - JWT_SECRET=gdfdsddsadsadghhhhsdsdsdansa
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro # Mount source for potential hot-reload (read-only)
    stdin_open: true
    tty: true

volumes:
  postgres_data:
    driver: local
