services:
  postgres:
    image: postgres:16
    platform: linux/amd64
    container_name: tide-raider-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tide_raider
      POSTGRES_PASSWORD: tide_raider_dev
      POSTGRES_DB: tide_raider_dev
    ports:
      - "5433:5432" # Using 5433 to avoid conflict with existing PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tide_raider"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tide-raider-backend
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - DATABASE_URL=postgresql://tide_raider:tide_raider_dev@postgres:5432/tide_raider_dev?schema=public
      - BACKEND_URL=https://unelective-michael-hipshot.ngrok-free.dev
      - GOOGLE_CLIENT_ID=82632174665-tlmshrjeeahbb3giec045o009u8ag67j.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=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
      - JWT_SECRET=your-secret-key-change-in-production
      - NEXTAUTH_SECRET=your-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro # Mount source for potential hot-reload (read-only)
    stdin_open: true
    tty: true

volumes:
  postgres_data:
    driver: local
