# Cloud Build configuration for deploying backend to Cloud Run
steps:
  # 1️⃣ Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/${_SERVICE_NAME}:${BUILD_ID}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/${_SERVICE_NAME}:latest"
      - "-f"
      - "Dockerfile" # Dockerfile in current folder
      - "." # Build context = current folder (backend)

  # 2️⃣ Push the Docker image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/${_SERVICE_NAME}"

  # 3️⃣ Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/${_SERVICE_NAME}:${BUILD_ID}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "2Gi"
      - "--cpu"
      - "2"
      - "--timeout"
      - "300"
      - "--max-instances"
      - "10"
      - "--min-instances"
      - "0"
      - "--set-env-vars"
      - "NODE_ENV=production,FRONTEND_URL=https://your-frontend.vercel.app"
      - "--update-secrets"
      - "DATABASE_URL=DATABASE_URL:latest"
      - "--update-secrets"
      - "GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest"
      - "--update-secrets"
      - "GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest"
      - "--update-secrets"
      - "JWT_SECRET=JWT_SECRET:latest"
      - "--update-secrets"
      - "NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest"

# Substitutions (can be overridden)
substitutions:
  _REGION: "europe-west1"
  _ARTIFACT_REGISTRY_REPO: "tide-raider"
  _SERVICE_NAME: "tide-raider-backend"

# Only log Cloud Logging output
options:
  logging: CLOUD_LOGGING_ONLY

# Images to push to Artifact Registry
images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/${_SERVICE_NAME}:${BUILD_ID}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/${_SERVICE_NAME}:latest"
