# fly.toml app configuration file generated for tide-raider-backend on 2024-01-01T00:00:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "tide-raider-backend"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  PORT = "4001"
  FLY_APP_NAME = "tide-raider-backend"

[http_service]
  internal_port = 4001
  force_https = true
  auto_stop_machines = true   # Enable auto-stop when idle to reduce costs
  auto_start_machines = true
  min_machines_running = 0    # Allow all machines to stop when idle
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 4001
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[processes]
  app = "npm start"

[deploy]
  release_command = "npx prisma migrate deploy"

[[restart]]
  policy = "on-failure"
  retries = 50
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

