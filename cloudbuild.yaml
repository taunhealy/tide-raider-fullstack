# cloudbuild.yaml → place this file at the repository root
steps:
  # 1. Pull the previous "latest" image to use as a cache
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/${_SERVICE_NAME}:latest || true

  # 2. Build the backend Docker image using cache
  - name: gcr.io/cloud-builders/docker
    dir: backend
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/${_SERVICE_NAME}:${BUILD_ID}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/${_SERVICE_NAME}:latest
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/${_SERVICE_NAME}:latest
      - .

  # 3. Push the image (both tags) to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/${_SERVICE_NAME}

  # 4. Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/${_SERVICE_NAME}:${BUILD_ID}
      - --region
      - ${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --timeout=600
      - --max-instances=10
      - --min-instances=0
      - --port=8080
      - --set-env-vars=NODE_ENV=production,FRONTEND_URL=https://www.tideraider.com
      - --update-secrets=GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest
      - --update-secrets=GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest
      - --update-secrets=JWT_SECRET=JWT_SECRET:latest
      - --update-secrets=NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest
      - --update-secrets=R2_ACCOUNT_ID=R2_ACCOUNT_ID:latest
      - --update-secrets=R2_ACCESS_KEY_ID=R2_ACCESS_KEY_ID:latest
      - --update-secrets=R2_SECRET_ACCESS_KEY=R2_SECRET_ACCESS_KEY:latest
      - --update-secrets=R2_BUCKET_NAME=R2_BUCKET_NAME:latest
      - --update-secrets=R2_PUBLIC_URL=R2_PUBLIC_URL:latest
      - --update-secrets=DATABASE_URL=DATABASE_URL:latest
      - --update-secrets=CRON_SECRET=CRON_SECRET:latest
      - --update-secrets=RESEND_API_KEY=RESEND_API_KEY:latest
      - --update-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest
      - --update-secrets=DIRECT_URL=DIRECT_URL:latest

# Default substitution values
substitutions:
  _REGION: europe-west1
  _ARTIFACT_REGISTRY_REPO: tide-raider
  _SERVICE_NAME: tide-raider-backend
  _FRONTEND_URL: https://www.tideraider.com

# Push these images
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/${_SERVICE_NAME}

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
