name: Monthly Partner Payouts

on:
  schedule:
    # Run at 09:00 UTC on the 1st of every month
    - cron: '0 9 1 * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  payout:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Payout System
        run: |
          curl -X POST \
          -H "Content-Type: application/json" \
          -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
          https://tide-raider-backend-82632174665.europe-west1.run.app/api/cron/process-payouts
