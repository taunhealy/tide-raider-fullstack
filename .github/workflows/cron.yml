name: Tide Raider Cron Jobs

on:
  schedule:
    # Run every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
    # This matches your current SAST schedule: 02:00, 06:00, 10:00, 14:00, 18:00, 22:00
    - cron: "0 */4 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-and-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Fetch and Alert Cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          echo "Triggering Cron Job at $(date)"
          # Using specific SAST timezone as default, or UTC if preferred
          TIMEZONE="Africa/Johannesburg" 
          
          # Call the fetch-and-alert endpoint
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$BACKEND_URL/api/cron/fetch-and-alert" \
            -H "Content-Type: application/json" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -d "{\"timezone\": \"$TIMEZONE\"}")

          http_code=$(echo "$response" | grep "HTTP_STATUS" | cut -d':' -f2)
          body=$(echo "$response" | sed 's/HTTP_STATUS:.*//')

          echo "Response Body: $body"
          
          if [ "$http_code" != "200" ]; then
            echo "Cron job failed with status $http_code"
            exit 1
          fi
          echo "Cron job completed successfully"
