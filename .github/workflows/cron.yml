name: Tide Raider Cron Jobs


# DEBUG: V2 - Added strict error handling
on:
  schedule:
    # Run every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
    # This matches your current SAST schedule: 02:00, 06:00, 10:00, 14:00, 18:00, 22:00
    - cron: "0 */4 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-and-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Fetch and Alert Cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          echo "Triggering Cron Job at $(date)"

          if [ -z "$BACKEND_URL" ]; then
            echo "Error: BACKEND_URL secret is not set or is empty."
            exit 1
          fi

          # Using specific SAST timezone as default, or UTC if preferred
          TIMEZONE="Africa/Johannesburg" 
          
          # Call the fetch-and-alert endpoint
          # Use set +e to capture curl failure manually
          set +e
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST "$BACKEND_URL/api/cron/fetch-and-alert" \
            -H "Content-Type: application/json" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -d "{\"timezone\": \"$TIMEZONE\"}")
          curl_exit_code=$?
          set -e

          if [ $curl_exit_code -ne 0 ]; then
            echo "Curl failed with exit code $curl_exit_code"
            if [ $curl_exit_code -eq 6 ]; then
              echo "Error: Could not resolve host. Please verify the BACKEND_URL secret in GitHub Settings."
            fi
            exit $curl_exit_code
          fi

          http_code=$(echo "$response" | grep "HTTP_STATUS" | cut -d':' -f2)
          body=$(echo "$response" | sed 's/HTTP_STATUS:.*//')

          echo "Response Body: $body"
          
          if [ "$http_code" != "200" ]; then
            echo "Cron job failed with status $http_code"
            exit 1
          fi
          echo "Cron job completed successfully"
